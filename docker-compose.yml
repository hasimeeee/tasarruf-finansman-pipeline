version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: tasarruf_db
    environment:
      POSTGRES_DB: tasarruf_finansman
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2491
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    restart: always

  pipeline:
    build: .
    container_name: tasarruf_pipeline
    depends_on:
      - postgres
    volumes:
      - .:/app
    working_dir: /app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tasarruf_finansman
      DB_USER: postgres
      DB_PASSWORD: 2491
    command: python src/data_generator.py

volumes:
  postgres_data: